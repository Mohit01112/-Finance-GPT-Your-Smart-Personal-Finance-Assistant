<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance-GPT - Your Personal Finance Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-robot"></i> Finance-GPT</h1>
                <p>Your Personal Finance Expert</p>
            </div>
            <div class="header-actions">
                <button id="clearChat" class="btn-secondary">
                    <i class="fas fa-trash"></i> Clear Chat
                </button>
            </div>
        </header>
        
        <main>
            <div class="chat-container">
                <div class="chat-history" id="chatHistory">
                    <div class="message bot-message welcome-message">
                        <div class="avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <p>Hello! I'm Finance-GPT, your personal finance expert. Ask me anything about:</p>
                            <ul>
                                <li><i class="fas fa-wallet"></i> Personal finance & budgeting</li>
                                <li><i class="fas fa-chart-line"></i> Investing & stock markets</li>
                                <li><i class="fas fa-piggy-bank"></i> Savings & retirement planning</li>
                                <li><i class="fas fa-credit-card"></i> Credit scores & loans</li>
                                <li><i class="fab fa-bitcoin"></i> Cryptocurrency & fintech</li>
                            </ul>
                            <p>How can I help you today?</p>
                        </div>
                    </div>
                </div>
                
                <div class="input-area">
                    <div class="input-container">
                        <input type="text" id="userInput" placeholder="Ask anything about finance..." autocomplete="off">
                        <button id="sendButton">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="typing-indicator" id="typingIndicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
