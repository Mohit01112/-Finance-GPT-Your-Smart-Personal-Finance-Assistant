<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance-GPT - Your Personal Finance Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="gradient-bg">
    <div class="centered-card">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-robot"></i> Finance-GPT</h1>
                <p>Your Personal Finance Expert</p>
            </div>
            <button id="clearChat" class="btn-secondary" aria-label="Clear Chat">
                <i class="fas fa-trash"></i> Clear Chat
            </button>
        </header>
        <main>
            <div class="chat-container">
                <div class="chat-history scroll-mask" id="chatHistory" tabindex="0" aria-live="polite">
                    <div class="message bot-message welcome-message">
                        <div class="message-wrapper">
                            <div class="avatar bot-avatar">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="message-content">
                                <p>Hello! I'm Finance-GPT, your personal finance expert. Ask me anything about:</p>
                                <ul>
                                    <li><i class="fas fa-wallet"></i> Personal Finance & Budgeting</li>
                                    <li><i class="fas fa-chart-line"></i> Stock Market & Investing</li>
                                    <li><i class="fas fa-piggy-bank"></i> Savings & Retirement Planning</li>
                                    <li><i class="fas fa-credit-card"></i> Loans & Credit Score</li>
                                    <li><i class="fab fa-bitcoin"></i> Cryptocurrency & Fintech</li>
                                </ul>
                                <p>How can I help you today?</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="input-area">
                    <div class="input-container">
                        <input type="text" id="userInput" placeholder="Ask anything about finance..." autocomplete="off" aria-label="Type your finance question">
                        <button id="sendButton" aria-label="Send"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="typing-indicator" id="typingIndicator" aria-hidden="true">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </main>
    </div>
<script src="/static/script.js"></script>
</body>
</html>
